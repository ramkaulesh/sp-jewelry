# yaml-language-server: $schema=https://github.com/dfinity/icp-cli/raw/refs/heads/main/docs/schemas/canister-yaml-schema.json
name: backend
build:
  steps:
    - type: script
      commands:
        - mops toolchain use moc latest
        - mops build
        - mv .mops/.cache/wasm/backend.wasm "$ICP_WASM_OUTPUT_PATH"
